<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found · Gallant Signal Marketing</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="logo/gsm-mark-gradient.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--ink-900:#0a0e1a;--ink-300:#a3acc4;--ink-400:#707b9a;--signal:#3de8e0;--signal-deep:#1a3fa0;--white:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink-900);color:var(--white);font-family:'Inter',sans-serif;padding:24px;text-align:center}
  .wrap{max-width:520px}
  img{height:64px;margin:0 auto 28px}
  .code{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--signal);text-transform:uppercase;margin-bottom:16px}
  h1{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:500;letter-spacing:-.03em;line-height:1.05;margin-bottom:16px}
  p{font-size:16px;color:var(--ink-300);line-height:1.6;margin-bottom:32px}
  a{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:var(--signal);color:var(--ink-900);font-weight:600;font-size:14px;border-radius:4px;text-decoration:none;transition:transform .15s,background .15s}
  a:hover{background:var(--white);transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo/gsm-mark-gradient.png" alt="Gallant Signal Marketing">
    <div class="code">404 · signal lost</div>
    <h1>This page wandered off.</h1>
    <p>The page you're looking for doesn't exist, or it's been moved. Let's get you back on the map.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
